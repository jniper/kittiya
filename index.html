<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Journey Map & Matrix</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts: Noto Sans Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Cyber Grid Background (Dark Mode Only) */
        .bg-grid-pattern {
            background-size: 50px 50px;
            background-image: 
            linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 100%);
        }

        /* Dot Pattern (Light Mode Only) */
        .bg-dot-pattern {
            background-size: 20px 20px;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
        }

        @keyframes scanline {
            0% { top: -100%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons Components ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Users = (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Building2 = (props) => <IconBase {...props}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></IconBase>;
        const Lightbulb = (props) => <IconBase {...props}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-1 1.5-2.4 1.5-3.8 0-3.2-2.8-5.7-6-5.7S6 4.5 6 7.7c0 1.4.5 2.8 1.5 3.8.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></IconBase>;
        const FlaskConical = (props) => <IconBase {...props}><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/></IconBase>;
        const Briefcase = (props) => <IconBase {...props}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconBase>;
        const GraduationCap = (props) => <IconBase {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>;
        const Globe = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></IconBase>;
        const Layout = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M3 9h18"/><path d="M9 21V9"/></IconBase>;
        const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
        const TrendingUp = (props) => <IconBase {...props}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></IconBase>;
        const Award = (props) => <IconBase {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconBase>;
        const Share2 = (props) => <IconBase {...props}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></IconBase>;
        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
        const Sun = (props) => <IconBase {...props}><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></IconBase>;
        const Moon = (props) => <IconBase {...props}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></IconBase>;
        const TableIcon = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="12" x2="12" y1="3" y2="21"/></IconBase>;
        const MapIcon = (props) => <IconBase {...props}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" x2="8" y1="2" y2="18"/><line x1="16" x2="16" y1="6" y2="22"/></IconBase>;


        // --- Configuration ---
        const customerSegments = [
        { id: 'startup', label: 'Startup', color: 'bg-red-600', text: 'text-red-400', lightText: 'text-red-600', border: 'border-red-500', glow: 'shadow-[0_0_20px_rgba(220,38,38,0.6)]', bg: 'bg-red-950/30', lightBg: 'bg-red-50' },
        { id: 'sme', label: 'SMEs', color: 'bg-fuchsia-600', text: 'text-fuchsia-400', lightText: 'text-fuchsia-600', border: 'border-fuchsia-500', glow: 'shadow-[0_0_20px_rgba(192,34,192,0.6)]', bg: 'bg-fuchsia-950/30', lightBg: 'bg-fuchsia-50' },
        { id: 'enterprise', label: 'Large Enterprise', color: 'bg-amber-500', text: 'text-amber-400', lightText: 'text-amber-600', border: 'border-amber-500', glow: 'shadow-[0_0_20px_rgba(245,158,11,0.6)]', bg: 'bg-amber-950/30', lightBg: 'bg-amber-50' },
        { id: 'student', label: 'Student', color: 'bg-emerald-500', text: 'text-emerald-400', lightText: 'text-emerald-600', border: 'border-emerald-500', glow: 'shadow-[0_0_20px_rgba(16,185,129,0.6)]', bg: 'bg-emerald-950/30', lightBg: 'bg-emerald-50' },
        { id: 'researcher', label: 'Researcher', color: 'bg-orange-500', text: 'text-orange-400', lightText: 'text-orange-600', border: 'border-orange-500', glow: 'shadow-[0_0_20px_rgba(249,115,22,0.6)]', bg: 'bg-orange-950/30', lightBg: 'bg-orange-50' },
        { id: 'governance', label: 'Governance', color: 'bg-indigo-500', text: 'text-indigo-400', lightText: 'text-indigo-600', border: 'border-indigo-500', glow: 'shadow-[0_0_20px_rgba(99,102,241,0.6)]', bg: 'bg-indigo-950/30', lightBg: 'bg-indigo-50' },
        { id: 'inter', label: 'Overseas agency', color: 'bg-lime-500', text: 'text-lime-400', lightText: 'text-lime-600', border: 'border-lime-500', glow: 'shadow-[0_0_20px_rgba(132,204,22,0.6)]', bg: 'bg-lime-950/30', lightBg: 'bg-lime-50' },
        ];

        const journeyData = [
        {
            category: "การใช้พื้นที่ (Space Usage)",
            icon: <Building2 className="w-5 h-5" />,
            services: [
            { name: "การให้บริการพื้นที่จัดประชุมและสัมมนา", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] },
            { name: "การให้บริการพื้นที่สำนักงาน", targets: ['startup', 'sme', 'enterprise', 'researcher', 'inter'] },
            { name: "การให้บริการจัดเลี้ยงอาหารและเครื่องดื่มสำหรับงานประชุม (Catering)", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] }, 
            ]
        },
        {
            category: "การบ่มเพาะและพัฒนาธุรกิจ",
            icon: <TrendingUp className="w-5 h-5" />,
            services: [
            { name: "การวางแผนและการขยายธุรกิจ", targets: ['startup', 'sme', 'enterprise'] },
            { name: "การทดสอบตลาด (Market Validation)", targets: ['startup', 'sme', 'enterprise'] },
            { name: "การพัฒนากลยุทธ์และโมเดลธุรกิจ", targets: ['startup', 'sme', 'enterprise'] },
            { name: "การพัฒนาผลิตภัณฑ์ใหม่ กระบวนการผลิตและดำเนินงานวิจัยร่วมกับภาคการศึกษา", targets: ['sme', 'enterprise'] },
            { name: "การอนุญาตให้ใช้สิทธิ (Licensing) ผลงานวิจัย", targets: ['sme', 'enterprise'] },
            ]
        },
        {
            category: "การบ่มเพาะความเป็นผู้ประกอบการ",
            icon: <Briefcase className="w-5 h-5" />,
            services: [
            { name: "การให้คำปรึกษาด้านการเริ่มต้นธุรกิจ", targets: ['student'] },
            { name: "การเข้าร่วมหลักสูตรและกิจกรรมการเรียนรู้", targets: ['student'] },
            { name: "การสร้างแรงบันดาลใจและแนวคิดเชิงผู้ประกอบการ", targets: ['student'] },
            ]
        },
        {
            category: "การบ่มเพาะและพัฒนางานวิจัย",
            icon: <BookOpen className="w-5 h-5" />,
            services: [
            { name: "การพัฒนาและต่อยอดงานวิจัยสู่การใช้ประโยชน์ในเชิงพาณิชย์", targets: ['researcher'] },
            { name: "การร่วมพัฒนาและดำเนินงานวิจัยร่วมกับภาคการศึกษา", targets: ['researcher'] },
            { name: "การอนุญาตให้ใช้สิทธิ (Licensing) ผลงานวิจัย", targets: ['researcher'] },
            { name: "การจัดตั้งบริษัท Tech spin-off", targets: ['researcher'] },
            ]
        },
        {
            category: "การใช้เทคโนโลยีพัฒนาผลิตภัณฑ์ด้านอาหาร",
            icon: <FlaskConical className="w-5 h-5" />,
            services: [
            { name: "การพัฒนาผลิตภัณฑ์อาหาร", targets: ['sme', 'student', 'researcher'] },
            { name: "การให้คำปรึกษาด้านกระบวนการผลิตและมาตรฐาน อย. ที่เกี่ยวข้องกับเทคโนโลยีอาหาร", targets: ['sme', 'student', 'researcher'] },
            { name: "การให้บริการกำจัดมอดและไข่แมลงในข้าวสาร", targets: ['sme', 'student', 'researcher'] },
            ]
        },
        {
            category: "การวิเคราะห์และทดสอบ",
            icon: <FlaskConical className="w-5 h-5" />,
            services: [
            { name: "การวิเคราะห์และทดสอบผลิตภัณฑ์และสารสำคัญทางด้านอาหาร", targets: ['sme', 'student', 'researcher', 'governance'] },
            { name: "การวิเคราะห์และปรับปรุงคุณภาพอัญมณี", targets: ['sme', 'student', 'researcher', 'governance'] },
            { name: "การให้บริการเครื่องมือวิเคราะห์ขั้นสูงในห้องปฏิบัติการพลาสมา", targets: ['sme', 'student', 'researcher', 'governance'] },
            ]
        },
        {
            category: "ทรัพย์สินทางปัญญา",
            icon: <Lightbulb className="w-5 h-5" />,
            services: [
            { name: "การให้บริการคำปรึกษาเรื่องทรัพย์สินทางปัญญา", targets: ['startup', 'sme', 'researcher', 'governance'] },
            ]
        },
        {
            category: "การเยี่ยมชมและศึกษาดูงาน",
            icon: <Search className="w-5 h-5" />,
            services: [
            { name: "การศึกษาดูงานด้านนวัตกรรม", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] },
            { name: "การศึกษาดูงานด้านพื้นที่ทดสอบตลาด", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] },
            ]
        },
        {
            category: "การออกแบบและประชาสัมพันธ์",
            icon: <Layout className="w-5 h-5" />,
            services: [
            { name: "การออกแบบอาร์ตเวิร์ค และสื่อทุกรูปแบบ (Artwork Design)", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] },
            { name: "การออกแบบบรรจุภัณฑ์ (Packaging Design)", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] },
            { name: "การออกแบบภายใน (Interior Design)", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] },
            { name: "การให้บริการเครื่องพิมพ์ 3 มิติ (3D printing)", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] },
            { name: "การให้บริการถ่ายภาพและพื้นที่สตูดิโอ", targets: ['startup', 'sme', 'enterprise', 'student', 'researcher', 'governance', 'inter'] },
            ]
        },
        {
            category: "Corporate Social Responsibility (CSR)",
            icon: <Share2 className="w-5 h-5" />,
            services: [
            { name: "การให้บริการออกแบบและจัดทำกิจกรรมเพื่อสังคม", targets: ['enterprise'] },
            ]
        },
        {
            category: "การพัฒนาเชิงกลยุทธ์และนโยบาย",
            icon: <Globe className="w-5 h-5" />,
            services: [
            { name: "การให้คำปรึกษาเชิงนโยบายและกลยุทธ์", targets: ['governance'] },
            { name: "การออกแบบและจัดทำโครงการพัฒนาศักยภาพคน พื้นที่ และอุตสาหกรรม", targets: ['governance'] },
            ]
        },
        {
            category: "การสร้างความร่วมมือ",
            icon: <Users className="w-5 h-5" />,
            services: [
            { name: "การสนับสนุนและต่อยอดความร่วมมือ (MOU) กับมหาวิทยาลัยเชียงใหม่", targets: ['inter'] },
            ]
        },
        ];

        // --- Matrix View Component ---
        const MatrixView = ({ data, segments, isDarkMode }) => {
            return (
                <div className={`overflow-hidden rounded-xl border shadow-sm transition-all duration-300 ${isDarkMode ? 'border-gray-800 bg-gray-900/50' : 'border-slate-200 bg-white'}`}>
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left border-collapse">
                            <thead className={`text-xs uppercase sticky top-0 z-20 shadow-md ${isDarkMode ? 'bg-gray-900 text-gray-400' : 'bg-slate-50 text-slate-700'}`}>
                                <tr>
                                    <th className={`px-6 py-4 font-bold sticky left-0 z-30 min-w-[250px] border-b border-r ${isDarkMode ? 'bg-gray-900 border-gray-800' : 'bg-slate-50 border-slate-200'}`}>
                                        Service Category / Service
                                    </th>
                                    {segments.map(seg => (
                                        <th key={seg.id} className={`px-4 py-4 text-center border-b min-w-[100px] whitespace-nowrap ${isDarkMode ? 'border-gray-800' : 'border-slate-200'}`}>
                                            <div className="flex flex-col items-center gap-2">
                                                <span className={`${isDarkMode ? seg.text : seg.lightText} font-bold`}>{seg.label}</span>
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className={`${isDarkMode ? 'text-gray-300' : 'text-slate-600'}`}>
                                {data.map((category, catIndex) => (
                                    <React.Fragment key={catIndex}>
                                        {/* Category Header Row */}
                                        <tr className={`${isDarkMode ? 'bg-gray-800/80 text-gray-200' : 'bg-slate-100 text-slate-800'} font-semibold`}>
                                            <td className={`px-6 py-3 sticky left-0 z-10 border-b border-r ${isDarkMode ? 'bg-gray-800/80 border-gray-700' : 'bg-slate-100 border-slate-200'} flex items-center gap-2`}>
                                                <span className={`${isDarkMode ? 'text-cyan-400' : 'text-blue-600'}`}>{category.icon}</span>
                                                {category.category}
                                            </td>
                                            {segments.map(seg => <td key={seg.id} className={`border-b ${isDarkMode ? 'border-gray-700' : 'border-slate-200'}`}></td>)}
                                        </tr>
                                        {/* Service Rows */}
                                        {category.services.map((service, sIndex) => (
                                            <tr key={sIndex} className={`transition-colors border-b last:border-0 ${isDarkMode ? 'border-gray-800 hover:bg-white/5 bg-transparent' : 'border-slate-100 hover:bg-slate-50 bg-white'}`}>
                                                <td className={`px-6 py-3 font-medium sticky left-0 z-10 border-r ${isDarkMode ? 'bg-black border-gray-800' : 'bg-white border-slate-100'} max-w-xs truncate`} title={service.name}>
                                                    {service.name}
                                                </td>
                                                {segments.map(seg => {
                                                    const isActive = service.targets.includes(seg.id);
                                                    return (
                                                        <td key={seg.id} className="px-4 py-3 text-center align-middle">
                                                            {isActive && (
                                                                <div className="flex justify-center">
                                                                    <div className={`w-4 h-4 rounded-full ${isDarkMode ? seg.color : seg.color} ${isDarkMode ? 'shadow-[0_0_8px_currentColor]' : ''} ring-2 ring-opacity-20 ${isDarkMode ? 'ring-white' : 'ring-slate-400'}`}></div>
                                                                </div>
                                                            )}
                                                        </td>
                                                    )
                                                })}
                                            </tr>
                                        ))}
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            )
        }

        const App = () => {
        const [selectedSegment, setSelectedSegment] = useState(null);
        const [isDarkMode, setIsDarkMode] = useState(false);
        const [viewMode, setViewMode] = useState('journey'); // 'journey' or 'matrix'

        const toggleSegment = (id) => {
            if (selectedSegment === id) {
            setSelectedSegment(null);
            } else {
            setSelectedSegment(id);
            }
        };

        const toggleTheme = () => {
            setIsDarkMode(!isDarkMode);
        };

        return (
            <div className={`min-h-screen font-sans pb-20 selection:bg-cyan-500 selection:text-white overflow-x-hidden relative transition-colors duration-500 ${isDarkMode ? 'bg-black text-slate-200' : 'bg-slate-50 text-slate-900'}`}>
                
                {/* --- Ambient Effects (Dark Mode Only) --- */}
                {isDarkMode && (
                    <>
                        <div className="fixed inset-0 bg-grid-pattern pointer-events-none z-0"></div>
                        <div className="fixed top-0 left-1/4 w-[500px] h-[500px] bg-blue-900/20 rounded-full blur-[100px] pointer-events-none"></div>
                        <div className="fixed bottom-0 right-1/4 w-[500px] h-[500px] bg-purple-900/20 rounded-full blur-[100px] pointer-events-none"></div>
                    </>
                )}
                
                {/* --- Ambient Effects (Light Mode Only) --- */}
                {!isDarkMode && (
                    <div className="fixed inset-0 bg-dot-pattern opacity-30 pointer-events-none z-0"></div>
                )}

                {/* Header */}
                <header className={`sticky top-0 z-50 backdrop-blur-md border-b transition-colors duration-500 ${isDarkMode ? 'bg-black/70 border-white/10' : 'bg-white/90 border-slate-200 shadow-sm'}`}>
                    <div className="max-w-7xl mx-auto px-4 py-4">
                        <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                            
                            {/* Logo & Title & View Toggle */}
                            <div className="flex flex-col md:flex-row items-start md:items-center justify-between w-full lg:w-auto gap-4">
                                <div>
                                    <h1 className={`text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r flex items-center gap-3 drop-shadow-sm ${isDarkMode ? 'from-cyan-400 via-blue-500 to-purple-500' : 'from-blue-600 via-indigo-600 to-purple-600'}`}>
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isDarkMode ? 'bg-gradient-to-br from-gray-800 to-black border border-gray-700 text-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.3)]' : 'bg-gradient-to-br from-blue-500 to-indigo-600 text-white shadow-md'}`}>
                                            <Layout size={20} />
                                        </div>
                                        Customer Journey
                                    </h1>
                                    <p className={`text-xs md:text-sm mt-1 ml-1 ${isDarkMode ? 'text-gray-400' : 'text-slate-500'}`}>Interactive Map for STeP Services</p>
                                </div>

                                {/* View Mode Toggle Button Group */}
                                <div className={`flex p-1 rounded-lg border ${isDarkMode ? 'bg-gray-900 border-gray-800' : 'bg-slate-100 border-slate-200'}`}>
                                    <button
                                        onClick={() => setViewMode('journey')}
                                        className={`flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all ${
                                            viewMode === 'journey' 
                                            ? (isDarkMode ? 'bg-gray-800 text-white shadow-sm' : 'bg-white text-slate-800 shadow-sm') 
                                            : (isDarkMode ? 'text-gray-400 hover:text-white' : 'text-slate-500 hover:text-slate-800')
                                        }`}
                                    >
                                        <MapIcon size={16} />
                                        <span className="hidden sm:inline">Journey</span>
                                    </button>
                                    <button
                                        onClick={() => setViewMode('matrix')}
                                        className={`flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all ${
                                            viewMode === 'matrix' 
                                            ? (isDarkMode ? 'bg-gray-800 text-white shadow-sm' : 'bg-white text-slate-800 shadow-sm') 
                                            : (isDarkMode ? 'text-gray-400 hover:text-white' : 'text-slate-500 hover:text-slate-800')
                                        }`}
                                    >
                                        <TableIcon size={16} />
                                        <span className="hidden sm:inline">Matrix</span>
                                    </button>
                                </div>

                                {/* Mobile Theme Toggle */}
                                <button 
                                    onClick={toggleTheme}
                                    className={`md:hidden absolute top-4 right-4 p-2 rounded-full transition-all ${isDarkMode ? 'bg-gray-800 text-yellow-400 hover:bg-gray-700' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                >
                                    {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                                </button>
                            </div>
                            
                            {/* Filter Controls (Only for Journey View) */}
                            {viewMode === 'journey' && (
                                <div className="flex flex-wrap gap-2 justify-start lg:justify-end items-center">
                                    {/* Desktop Theme Toggle */}
                                    <button 
                                        onClick={toggleTheme}
                                        className={`hidden lg:flex p-2 mr-2 rounded-full transition-all ${isDarkMode ? 'bg-gray-800 text-yellow-400 hover:bg-gray-700' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                        title="Toggle Theme"
                                    >
                                        {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                                    </button>

                                    <button
                                        onClick={() => setSelectedSegment(null)}
                                        className={`px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 border backdrop-blur-sm ${
                                            selectedSegment === null
                                            ? (isDarkMode ? 'bg-white text-black border-white shadow-[0_0_20px_rgba(255,255,255,0.4)] transform scale-105 font-bold' : 'bg-slate-800 text-white border-slate-800 shadow-lg transform scale-105')
                                            : (isDarkMode ? 'bg-gray-900/60 text-gray-400 border-gray-800 hover:bg-gray-800 hover:text-white' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50')
                                        }`}
                                    >
                                        View All
                                    </button>

                                    {customerSegments.map((seg) => (
                                        <button
                                        key={seg.id}
                                        onClick={() => toggleSegment(seg.id)}
                                        className={`relative px-3 py-1.5 rounded-full text-[10px] md:text-xs font-medium transition-all duration-300 border flex items-center gap-1.5 overflow-hidden group ${
                                            selectedSegment === seg.id
                                            ? (isDarkMode 
                                                ? `bg-black text-white ${seg.border} ${seg.glow} transform scale-105 ring-1 ring-white/20` 
                                                : `bg-slate-800 text-white border-transparent shadow-lg transform scale-105`)
                                            : (isDarkMode
                                                ? `bg-gray-900/40 text-gray-500 border-gray-800 hover:bg-gray-800 hover:text-gray-300 hover:border-gray-600`
                                                : `bg-white text-slate-600 border-slate-200 hover:bg-slate-50 hover:text-slate-800`)
                                        }`}
                                        >
                                        <span className={`w-1.5 h-1.5 rounded-full ${selectedSegment === seg.id ? (isDarkMode ? seg.text : 'bg-white') : seg.color} ${isDarkMode ? 'shadow-[0_0_10px_currentColor]' : ''}`}></span>
                                        {seg.label}
                                        
                                        {selectedSegment === seg.id && (
                                            <div className={`absolute inset-0 opacity-20 ${seg.color}`}></div>
                                        )}
                                        </button>
                                    ))}
                                </div>
                            )}

                             {/* Helper Controls for Matrix View (Just Theme Toggle) */}
                             {viewMode === 'matrix' && (
                                <div className="flex justify-end items-center">
                                     <button 
                                        onClick={toggleTheme}
                                        className={`hidden lg:flex p-2 rounded-full transition-all ${isDarkMode ? 'bg-gray-800 text-yellow-400 hover:bg-gray-700' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                        title="Toggle Theme"
                                    >
                                        {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                                    </button>
                                </div>
                             )}
                        </div>
                    </div>
                </header>

                {/* Legend Bar (Mobile only sticky - Journey Mode Only) */}
                {viewMode === 'journey' && (
                    <div className={`xl:hidden backdrop-blur border-b px-4 py-3 text-xs text-center sticky top-[89px] md:top-[105px] z-40 transition-colors ${isDarkMode ? 'bg-black/80 border-white/10 text-gray-400' : 'bg-white/90 border-slate-200 text-slate-500'}`}>
                        {selectedSegment ? (
                            <span className="flex items-center justify-center gap-2">
                                Showing path for: <span className={`font-bold ${isDarkMode ? customerSegments.find(s=>s.id === selectedSegment)?.text : customerSegments.find(s=>s.id === selectedSegment)?.lightText}`}>{customerSegments.find(s=>s.id === selectedSegment)?.label}</span>
                            </span>
                        ) : "Tap filters to highlight specific paths"}
                    </div>
                )}

                {/* Main Content Area */}
                <main className="max-w-7xl mx-auto px-4 py-8 md:py-12 relative z-10">
                    
                    {/* --- JOURNEY VIEW --- */}
                    {viewMode === 'journey' && (
                        <div className="relative max-w-6xl mx-auto animate-fadeIn">
                            {/* Central Line (The Spine) */}
                            <div className={`absolute left-4 md:left-1/2 top-0 bottom-0 w-[2px] transform md:-translate-x-1/2 transition-colors duration-500 ${isDarkMode ? 'bg-gradient-to-b from-cyan-500 via-purple-600 to-pink-500 opacity-40' : 'bg-slate-200'}`}></div>
                            
                            {/* Moving Pulse Effect on Spine (Scanline - Dark Mode Only) */}
                            {isDarkMode && (
                                <div className="absolute left-4 md:left-1/2 top-0 bottom-0 w-[2px] transform md:-translate-x-1/2 overflow-hidden">
                                    <div className="w-full h-32 bg-gradient-to-b from-transparent via-white to-transparent absolute top-0 animate-[scanline_4s_ease-in-out_infinite] opacity-70 blur-[1px]"></div>
                                </div>
                            )}

                            <div className="space-y-12 md:space-y-16">
                                {journeyData.map((category, index) => {
                                // Check visibility
                                const hasActiveServices = selectedSegment 
                                    ? category.services.some(s => s.targets.includes(selectedSegment))
                                    : true;

                                if (!hasActiveServices) return null;

                                const isLeft = index % 2 === 0;

                                return (
                                    <div key={index} className={`relative flex flex-col md:flex-row items-center ${isLeft ? 'md:flex-row-reverse' : ''}`}>
                                    
                                    {/* Central Node (Glowing Dot) */}
                                    <div className={`absolute left-4 md:left-1/2 w-4 h-4 rounded-full z-20 transform md:-translate-x-1/2 transition-all duration-500 ${
                                        isDarkMode 
                                        ? (selectedSegment ? 'bg-white shadow-[0_0_20px_white] scale-125 border border-white/50' : 'bg-black shadow-[0_0_15px_rgba(6,182,212,0.8)] border border-white/50')
                                        : (selectedSegment ? 'bg-slate-800 border-4 border-slate-100 shadow-md scale-125' : 'bg-white border-4 border-slate-200 shadow-sm')
                                    }`}></div>

                                    {/* Spacer */}
                                    <div className="hidden md:block w-1/2"></div>

                                    {/* Content Card */}
                                    <div className={`w-full md:w-1/2 pl-12 md:pl-0 ${isLeft ? 'md:pr-16' : 'md:pl-16'}`}>
                                        
                                        {/* Card Container */}
                                        <div className={`
                                            relative overflow-hidden rounded-xl border transition-all duration-500 group
                                            ${isDarkMode 
                                                ? (selectedSegment ? 'bg-gray-900/60 border-gray-600/50 shadow-2xl backdrop-blur-md' : 'bg-black/40 border-white/10 hover:border-cyan-500/50 hover:shadow-[0_0_30px_rgba(6,182,212,0.15)] backdrop-blur-sm')
                                                : (selectedSegment ? 'bg-white border-slate-200 shadow-xl' : 'bg-white border-slate-100 hover:border-blue-200 shadow-lg hover:shadow-xl')
                                            }
                                        `}>
                                        {/* Gradient glow effect on hover (Dark Mode) */}
                                        {isDarkMode && <div className="absolute inset-0 bg-gradient-to-br from-cyan-500/0 via-purple-500/0 to-pink-500/0 group-hover:via-cyan-500/5 transition-all duration-500"></div>}

                                        {/* Category Header */}
                                        <div className={`relative px-6 py-4 border-b flex items-center gap-4 ${
                                            isDarkMode 
                                            ? 'bg-white/5 border-white/5' 
                                            : 'bg-slate-50/80 border-slate-100'
                                        }`}>
                                            <div className={`p-2.5 rounded-lg shadow-inner ${
                                                isDarkMode 
                                                ? (selectedSegment ? 'bg-gray-800 text-white border border-white/5' : 'bg-gray-900 text-cyan-400 border border-white/5')
                                                : (selectedSegment ? 'bg-slate-800 text-white' : 'bg-white text-blue-600 border border-slate-100 shadow-sm')
                                            }`}>
                                            {category.icon}
                                            </div>
                                            <h3 className={`font-bold text-lg tracking-wide ${isDarkMode ? 'text-gray-100 drop-shadow-md' : 'text-slate-800'}`}>{category.category}</h3>
                                        </div>

                                        {/* Sub-services List */}
                                        <div className="relative p-2">
                                            {category.services.map((service, sIndex) => {
                                            const isRelevant = selectedSegment ? service.targets.includes(selectedSegment) : true;
                                            
                                            if (selectedSegment && !isRelevant) return null;

                                            return (
                                                <div 
                                                key={sIndex} 
                                                className={`
                                                    flex items-start gap-4 p-4 rounded-lg transition-all duration-300 border border-transparent
                                                    ${isDarkMode
                                                        ? (selectedSegment ? 'bg-gradient-to-r from-white/10 to-transparent border-white/5 mb-2 last:mb-0' : 'hover:bg-white/5 hover:border-white/10')
                                                        : (selectedSegment ? 'bg-slate-50 border-slate-100 mb-2 last:mb-0' : 'hover:bg-slate-50 hover:border-slate-100')
                                                    }
                                                `}
                                                >
                                                {/* Dot Logic */}
                                                <div className="mt-1.5 flex-shrink-0">
                                                    {selectedSegment ? (
                                                    <div className={`w-2 h-2 rounded-full ${customerSegments.find(s=>s.id === selectedSegment)?.color} ${isDarkMode ? 'shadow-[0_0_10px_currentColor]' : ''}`}></div>
                                                    ) : (
                                                    <div className="flex -space-x-1">
                                                        {service.targets.slice(0, 3).map(t => {
                                                        const seg = customerSegments.find(s => s.id === t);
                                                        if (!seg) return null;
                                                        return (
                                                            <div key={t} className={`w-2 h-2 rounded-full border ${isDarkMode ? 'border-black' : 'border-white ring-1 ring-slate-100'} ${seg.color}`}></div>
                                                        )
                                                        })}
                                                        {service.targets.length > 3 && <div className={`w-2 h-2 rounded-full border ${isDarkMode ? 'bg-gray-700 border-black' : 'bg-slate-200 border-white ring-1 ring-slate-100'}`}></div>}
                                                    </div>
                                                    )}
                                                </div>
                                                
                                                <div className="flex-1">
                                                    <p className={`text-sm md:text-base leading-relaxed ${
                                                        isDarkMode 
                                                        ? (selectedSegment ? 'text-white font-medium' : 'text-gray-300 group-hover:text-gray-100')
                                                        : (selectedSegment ? 'text-slate-900 font-medium' : 'text-slate-600 group-hover:text-slate-800')
                                                    }`}>
                                                    {service.name}
                                                    </p>
                                                    
                                                    {/* Tags */}
                                                    {!selectedSegment && (
                                                    <div className={`mt-3 flex flex-wrap gap-1.5 transition-opacity duration-300 ${isDarkMode ? 'opacity-40 group-hover:opacity-100' : 'opacity-60 group-hover:opacity-100'}`}>
                                                        {service.targets.map(target => {
                                                        const seg = customerSegments.find(s => s.id === target);
                                                        if (!seg) return null;
                                                        return (
                                                            <span key={target} className={`text-[9px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded-[2px] 
                                                                ${isDarkMode 
                                                                    ? `${seg.bg} ${seg.text} border border-white/5` 
                                                                    : `${seg.lightBg} ${seg.lightText} border border-transparent`
                                                                }`}>
                                                            {seg.label}
                                                            </span>
                                                        );
                                                        })}
                                                    </div>
                                                    )}
                                                </div>
                                                </div>
                                            );
                                            })}
                                        </div>
                                        </div>
                                        
                                        {/* Visual Connector Line */}
                                        <div className={`
                                            hidden md:block absolute top-10 h-[1px] w-16 z-0
                                            ${isDarkMode 
                                                ? 'bg-gradient-to-r from-transparent via-cyan-500/40 to-transparent' 
                                                : 'bg-gradient-to-r from-transparent via-slate-300 to-transparent'
                                            }
                                            ${isLeft ? 'right-[48%] bg-gradient-to-l' : 'left-[48%]'}
                                        `}></div>
                                    </div>

                                    </div>
                                );
                                })}
                            </div>

                             {/* Bottom Call to Action */}
                            <div className="mt-24 flex justify-center relative z-10 pb-10">
                                <div className="relative group cursor-default">
                                    {isDarkMode && <div className="absolute -inset-1 bg-gradient-to-r from-cyan-600 via-purple-600 to-pink-600 rounded-full blur opacity-40 group-hover:opacity-75 transition duration-500 animate-pulse"></div>}
                                    <div className={`relative px-8 py-3 rounded-full leading-none flex items-center space-x-2 ${
                                        isDarkMode 
                                        ? 'bg-black ring-1 ring-white/20' 
                                        : 'bg-white shadow-lg border border-slate-100'
                                    }`}>
                                        <Award size={18} className={isDarkMode ? 'text-cyan-400' : 'text-blue-600'} />
                                        <span className={`font-semibold text-sm tracking-wide ${isDarkMode ? 'text-gray-200' : 'text-slate-800'}`}>Target: Sustainable Growth</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MATRIX VIEW --- */}
                    {viewMode === 'matrix' && (
                        <div className="animate-fadeIn">
                             <MatrixView data={journeyData} segments={customerSegments} isDarkMode={isDarkMode} />
                             <div className={`mt-6 text-center text-sm ${isDarkMode ? 'text-gray-500' : 'text-slate-400'}`}>
                                * ตารางแสดงความสัมพันธ์ระหว่างบริการและกลุ่มเป้าหมาย (Service & Customer Matrix)
                             </div>
                        </div>
                    )}
                </main>
            </div>
        );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
